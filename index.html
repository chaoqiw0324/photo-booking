<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>约拍工作室</title>
<style>
:root {
  --accent: #2c2c2c;
  --accent-light: #f7f5f2;
  --green: #34a853;
  --red: #d93025;
  --orange: #f29d0e;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --toc-width: 150px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: #faf9f7; color: #333; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Hero */
.hero {
  text-align: center; padding: 60px 20px 40px;
  background: linear-gradient(180deg, #f0ece6 0%, #faf9f7 100%);
}
.hero h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
.hero .subtitle { margin-top: 8px; font-size: 14px; color: #888; }
.hero .contact-row { margin-top: 16px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
.hero .contact-tag { font-size: 13px; color: #666; background: #fff; padding: 6px 16px; border-radius: 20px; box-shadow: var(--shadow); }

/* Tabs */
.tabs {
  display: flex; justify-content: center;
  position: sticky; top: 0; z-index: 100;
  background: #faf9f7; padding: 12px 20px 0;
}
.tab-btn {
  padding: 10px 20px; font-size: 14px; font-weight: 500;
  border: none; background: none; color: #999; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Two-column layout */
.tab-content-layout {
  max-width: 960px; margin: 0 auto;
  padding: 24px 16px 60px;
  display: flex; gap: 28px; align-items: flex-start;
}

/* TOC sidebar */
.toc-sidebar {
  width: var(--toc-width); flex-shrink: 0;
  position: sticky; top: 56px;
}
.toc-group { margin-bottom: 6px; }
.toc-l1 {
  font-size: 13px; font-weight: 600; color: #555;
  padding: 5px 8px; display: block; cursor: pointer;
  border-radius: 6px; transition: color 0.15s;
}
.toc-l1:hover { color: var(--accent); }
.toc-l1.active { color: var(--accent); }
.toc-l2 {
  font-size: 12px; color: #aaa;
  padding: 3px 8px 3px 18px; display: block; cursor: pointer;
  transition: color 0.15s;
}
.toc-l2:hover { color: #666; }
.toc-l2.active { color: var(--accent); font-weight: 500; }

/* Main content */
.tab-main { flex: 1; min-width: 0; }

/* Category & brand sections */
.cat-section { margin-bottom: 36px; }
.cat-header {
  font-size: 17px; font-weight: 700; color: var(--accent);
  margin-bottom: 20px; padding-bottom: 10px;
  border-bottom: 2px solid #ece9e4;
}
.brand-section { margin-bottom: 24px; }
.brand-header {
  font-size: 12px; font-weight: 700; color: #aaa;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 12px;
}

/* Equipment card (body / camera) */
.equip-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 12px;
  transition: transform 0.2s;
}
.equip-card:hover { transform: translateY(-2px); }
.equip-header { display: flex; align-items: center; padding: 16px; gap: 14px; }
.equip-icon {
  width: 52px; height: 52px; border-radius: 10px;
  background: var(--accent-light); display: flex;
  align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
}
.equip-info { flex: 1; min-width: 0; }
.equip-name { font-size: 15px; font-weight: 600; color: #222; }
.equip-spec { font-size: 12px; color: #999; margin-top: 2px; }
.equip-status {
  font-size: 12px; font-weight: 500; padding: 4px 10px;
  border-radius: 12px; flex-shrink: 0;
}
.status-available { background: #e6f4ea; color: var(--green); }
.status-in-use { background: #fef3e0; color: var(--orange); }
.status-unavailable { background: #fce8e6; color: var(--red); }

/* Sample gallery */
.sample-gallery {
  display: flex; gap: 4px; padding: 0 16px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
}
.sample-gallery::-webkit-scrollbar { display: none; }
.sample-img {
  width: 140px; height: 180px; object-fit: cover; border-radius: 8px;
  flex-shrink: 0; scroll-snap-align: start; background: #eee;
  cursor: pointer; transition: opacity 0.2s;
}
.sample-img:hover { opacity: 0.85; }

/* Secondary (lens / stock / paper) group */
.sub-group {
  margin-left: 14px; margin-top: 2px; margin-bottom: 4px;
  border-left: 2px solid #ece9e4; padding-left: 14px;
}
.sub-label {
  font-size: 11px; font-weight: 700; color: #ccc;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px; margin-top: 4px;
}
.sub-card {
  background: #fff; border-radius: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  overflow: hidden; margin-bottom: 8px;
}
.sub-card .equip-header { padding: 12px 14px; gap: 10px; }
.sub-card .equip-icon { width: 38px; height: 38px; font-size: 17px; border-radius: 7px; }
.sub-card .equip-name { font-size: 13px; }
.sub-card .equip-spec { font-size: 11px; }
.sub-card .equip-status { font-size: 11px; padding: 3px 8px; }
.sub-card .sample-gallery { padding: 0 14px 12px; }
.sub-card .sample-img { width: 110px; height: 140px; }

/* Paper stock badge */
.paper-stock {
  font-size: 11px; font-weight: 500; padding: 3px 8px;
  border-radius: 10px; flex-shrink: 0;
}
.paper-stock-ok { background: #e6f4ea; color: var(--green); }
.paper-stock-low { background: #fef3e0; color: var(--orange); }
.paper-stock-out { background: #fce8e6; color: var(--red); }

/* Section title/desc (booking tab) */
.section-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--accent); }
.section-desc { font-size: 13px; color: #999; margin-bottom: 20px; }

/* Booking form */
.booking-section { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
.form-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px;
}
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
.form-label .required { color: var(--red); margin-left: 2px; }
.form-input, .form-textarea {
  width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
  border-radius: 8px; font-size: 14px; font-family: inherit;
  background: #fafafa; transition: border-color 0.2s; outline: none;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent); background: #fff; }
.form-textarea { resize: vertical; min-height: 60px; }

/* Equipment hierarchy in form */
.form-equip-group { margin-bottom: 14px; }
.form-cat-label {
  font-size: 12px; font-weight: 700; color: #888;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 10px; padding-bottom: 5px;
  border-bottom: 1px solid #eee; display: block;
}
.form-sub-label {
  font-size: 11px; font-weight: 600; color: #bbb;
  margin: 10px 0 6px; display: block;
}
.form-brand-label {
  font-size: 12px; color: #999; margin: 8px 0 5px; display: block;
}
.form-item-label {
  font-size: 11px; font-weight: 600; color: #c0bab5;
  letter-spacing: 0.5px; margin: 6px 0 5px; display: block;
}
.checkbox-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.checkbox-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: #555; cursor: pointer;
  background: #f5f5f5; padding: 6px 12px; border-radius: 20px;
  transition: all 0.2s; user-select: none; border: 1.5px solid transparent;
}
.checkbox-item:hover { background: #eee; }
.checkbox-item.checked { background: #f0ece6; border-color: var(--accent); color: var(--accent); font-weight: 500; }
.checkbox-item.disabled { opacity: 0.45; cursor: not-allowed; text-decoration: line-through; }

/* Submit */
.form-submit {
  width: 100%; padding: 14px; border: none; border-radius: 10px;
  background: var(--accent); color: #fff; font-size: 16px;
  font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-family: inherit;
}
.form-submit:hover { opacity: 0.85; }
.form-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* Success overlay */
.success-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 500;
  align-items: center; justify-content: center; padding: 20px;
}
.success-overlay.show { display: flex; }
.success-card {
  background: #fff; border-radius: 16px; padding: 40px 30px;
  text-align: center; max-width: 360px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.success-icon { font-size: 48px; margin-bottom: 16px; }
.success-title { font-size: 20px; font-weight: 700; color: #222; }
.success-desc { font-size: 14px; color: #888; margin-top: 10px; line-height: 1.8; }
.success-wechat { margin-top: 20px; padding: 14px; background: #f0ece6; border-radius: 10px; font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: 1px; }
.success-wechat-hint { font-size: 12px; color: #aaa; margin-top: 6px; }
.success-close { margin-top: 20px; padding: 10px 32px; border: 1.5px solid #ddd; border-radius: 8px; background: none; font-size: 14px; cursor: pointer; color: #666; font-family: inherit; }

/* Lightbox */
.lightbox {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9); z-index: 1000;
  align-items: center; justify-content: center; cursor: zoom-out;
}
.lightbox.show { display: flex; }
.lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; border-radius: 4px; }

/* Footer */
.footer { text-align: center; padding: 40px 20px; font-size: 12px; color: #ccc; }

/* Mobile */
@media (max-width: 640px) {
  .hero h1 { font-size: 22px; }
  .tab-btn { padding: 10px 14px; font-size: 13px; }

  .tab-content-layout {
    flex-direction: column;
    padding: 14px 12px 40px;
    gap: 12px;
  }
  .toc-sidebar {
    width: 100%; position: static;
    display: flex; flex-wrap: nowrap;
    overflow-x: auto; gap: 6px; padding-bottom: 2px;
  }
  .toc-sidebar::-webkit-scrollbar { display: none; }
  .toc-group { display: contents; }
  .toc-l1, .toc-l2 {
    white-space: nowrap; flex-shrink: 0;
    background: #f0ece6; padding: 6px 14px;
    border-radius: 20px; font-size: 12px; font-weight: 500; color: #666;
  }
  .toc-l2 { padding-left: 14px; }
  .toc-l1.active, .toc-l2.active { background: var(--accent); color: #fff; font-weight: 600; }

  .sample-img { width: 120px; height: 150px; }
  .sub-card .sample-img { width: 90px; height: 115px; }
}
</style>
</head>
<body>

<div id="app"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <div class="success-title">提交成功！</div>
    <div class="success-desc">我已收到你的约拍需求<br>会尽快通过微信联系你确认细节</div>
    <div class="success-wechat" id="successWechat"></div>
    <div class="success-wechat-hint">👆 添加微信沟通更快哦</div>
    <button class="success-close" onclick="closeSuccess()">好的</button>

</div>

<script>
// ============================================================
// 数据配置区
// ============================================================

const DATA = {

  // 数码器材

      {

          },
          {

            body: {

            },
            lenses: [
              { icon: "🔭", name: "Hasselblad XCD 28mm F4 P", spec: "等效22mm人文广角 · 极致轻便", status: "available", samples: [] }

      },
      {
        id: "fixed",
        label: "固定镜头",
        cameras: [
          {
            id: "fuji-x100",

            status: "available", samples: []
          }
        ]
      }
    ]
  },

  // 胶片 & 拍立得
  filmInstant: {
    categories: [
      {
        id: "film",
        label: "胶片",
        cameras: [
          {
            id: "pentax",
            icon: "🎞️", name: "Pentax Espio 928",
            spec: "经典变焦口袋胶片傻瓜机",
            status: "available", samples: [],
            stocks: [
              { name: "Fujifilm 200",    spec: "彩色负片 · 日常通用",       samples: [] },
              { name: "Fujifilm 400",    spec: "彩色负片 · 高感低噪",       samples: [] },
              { name: "Kodak Gold 200",  spec: "柯达金 · 暖调经典",         samples: [] },
              { name: "Kodak Portra 400", spec: "柯达 Portra · 人像神卷",   samples: [] }
            ]
          }
        ]
      },
      {
        id: "instant",
        label: "拍立得",
        cameras: [
          {
            id: "polaroid",
            icon: "📸", name: "Polaroid I-2",
            spec: "宝丽来旗舰拍立得 · 手动控制",
            status: "available", samples: [],
            papers: [
              { name: "Polaroid 600 Round Frame",         spec: "600 系列 · 圆框限量版",            stock: 2,  samples: [] },
              { name: "Polaroid SX-70 Paul Smith Edition", spec: "SX-70 系列 · Paul Smith 限量版",  stock: 3,  samples: [] },
              { name: "Polaroid I-Type Thrasher Edition", spec: "I-Type 系列 · Thrasher 限量版",    stock: 3,  samples: [] },
              { name: "Polaroid I-Type MoMA Edition",     spec: "I-Type 系列 · MoMA 限量版",        stock: 2,  samples: [] },
              { name: "Polaroid I-Type Basquiat Edition", spec: "I-Type 系列 · Basquiat 限量版",    stock: 1,  samples: [] },
              { name: "Polaroid I-Type Black & White",    spec: "I-Type 系列 · 黑白相纸",           stock: 1,  samples: [] }
            ]
          },
          {

            icon: "📸", name: "Fujifilm Instax Wide Evo",
            spec: "宽幅拍立得 · 数码预览",

              { name: "Instax Wide 白框相纸", spec: "宽幅 · 经典白框", stock: 99, samples: [] }
            ]
          },
          {
            id: "lomo",
            icon: "📸", name: "Lomography Lomo'Instant Mini",
            spec: "乐模迷你拍立得 · 多重曝光",
            status: "available", samples: [],
            papers: [
              { name: "Instax Mini 白框相纸", spec: "迷你 · 经典白框", stock: 99, samples: [] }
            ]
          }
        ]
      }

  }

// ============================================================
// 状态
// ============================================================

let currentTab = 'digital';
let selectedItems = new Set();

// ============================================================
// 辅助
// ============================================================

function statusLabel(s) {
  const map = {
    available:   ['可预约', 'status-available'],
    'in-use':    ['使用中', 'status-in-use'],
    unavailable: ['不可用', 'status-unavailable']
  };
  const [text, cls] = map[s] || ['—', ''];
  return `<span class="equip-status ${cls}">${text}</span>`;
}

function paperStockBadge(stock) {
  if (stock >= 99) return '';
  if (stock === 0) return `<span class="paper-stock paper-stock-out">缺货</span>`;
  if (stock <= 2)  return `<span class="paper-stock paper-stock-low">剩${stock}盒</span>`;
  return `<span class="paper-stock paper-stock-ok">${stock}盒</span>`;
}

function renderSamples(imgs) {
  if (!imgs || !imgs.length) return '';
  return `<div class="sample-gallery">${
    imgs.map(src =>
      `<img class="sample-img" src="${src}" alt="客片" loading="lazy"
        onclick="openLightbox('${src.replace(/w=\d+/,'w=1200')}')"
        onerror="this.style.display='none'">`
    ).join('')
  }</div>`;
}

// ============================================================
// 卡片渲染
// ============================================================

function equipCard(e) {
  return `
    <div class="equip-card">
      <div class="equip-header">
        <div class="equip-icon">${e.icon}</div>
        <div class="equip-info">
          <div class="equip-name">${e.name}</div>
          <div class="equip-spec">${e.spec}</div>
        </div>
        ${statusLabel(e.status)}
      </div>
      ${renderSamples(e.samples)}
    </div>`;
}

function subCard(icon, name, spec, badge, samples) {
  return `
    <div class="sub-card">
      <div class="equip-header">
        <div class="equip-icon">${icon}</div>
        <div class="equip-info">
          <div class="equip-name">${name}</div>
          <div class="equip-spec">${spec}</div>
        </div>
        ${badge}
      </div>
      ${renderSamples(samples)}
    </div>`;
}

// ============================================================
// 数码 Tab
// ============================================================

function renderDigital() {
  const toc = DATA.digital.categories.map(cat => `
    <div class="toc-group">
      <span class="toc-l1" data-target="${cat.id}" onclick="scrollToId('${cat.id}')">${cat.label}</span>
      ${cat.brands
        ? cat.brands.map(b => `<span class="toc-l2" data-target="${b.id}" onclick="scrollToId('${b.id}')">· ${b.label}</span>`).join('')
        : cat.cameras.map(c => `<span class="toc-l2" data-target="${c.id}" onclick="scrollToId('${c.id}')">· 富士</span>`).join('')
      }
    </div>`).join('');

  const content = DATA.digital.categories.map(cat => `
    <div class="cat-section" id="${cat.id}" data-spy="${cat.id}">
      <div class="cat-header">${cat.label}</div>
      ${cat.brands ? cat.brands.map(brand => `
        <div class="brand-section" id="${brand.id}" data-spy="${brand.id}">
          <div class="brand-header">${brand.label}</div>
          ${equipCard(brand.body)}
          ${brand.lenses.length ? `
            <div class="sub-group">
              <div class="sub-label">镜头</div>
              ${brand.lenses.map(l => subCard(l.icon, l.name, l.spec, statusLabel(l.status), l.samples)).join('')}
            </div>` : ''}
        </div>`).join('')
      : cat.cameras.map(cam => `
        <div class="brand-section" id="${cam.id}" data-spy="${cam.id}">
          ${equipCard(cam)}
        </div>`).join('')}
    </div>`).join('');

  return `<div class="tab-content-layout">
    <nav class="toc-sidebar">${toc}</nav>
    <div class="tab-main">${content}</div>
  </div>`;
}

// ============================================================
// 胶片/拍立得 Tab
// ============================================================

function renderFilmInstant() {
  const shortName = cam =>
    cam.name.includes('Pentax') ? 'Pentax Espio'
    : cam.name.includes('Polaroid') ? 'Polaroid I-2'
    : cam.name.includes('Wide') ? 'Wide Evo'
    : 'Lomography';

  const toc = DATA.filmInstant.categories.map(cat => `
    <div class="toc-group">
      <span class="toc-l1" data-target="${cat.id}" onclick="scrollToId('${cat.id}')">${cat.label}</span>
      ${cat.cameras.map(c => `<span class="toc-l2" data-target="${c.id}" onclick="scrollToId('${c.id}')">· ${shortName(c)}</span>`).join('')}
    </div>`).join('');

  const content = DATA.filmInstant.categories.map(cat => `
    <div class="cat-section" id="${cat.id}" data-spy="${cat.id}">
      <div class="cat-header">${cat.label}</div>
      ${cat.cameras.map(cam => `
        <div class="brand-section" id="${cam.id}" data-spy="${cam.id}">
          ${equipCard(cam)}
          ${cam.stocks && cam.stocks.length ? `
            <div class="sub-group">
              <div class="sub-label">胶卷</div>
              ${cam.stocks.map(s => subCard('🎞️', s.name, s.spec, '', s.samples)).join('')}
            </div>` : ''}
          ${cam.papers && cam.papers.length ? `
            <div class="sub-group">
              <div class="sub-label">相纸</div>
              ${cam.papers.map(p => subCard('🗂️', p.name, p.spec, paperStockBadge(p.stock), p.samples)).join('')}
            </div>` : ''}
        </div>`).join('')}
    </div>`).join('');

  return `<div class="tab-content-layout">
    <nav class="toc-sidebar">${toc}</nav>
    <div class="tab-main">${content}</div>
  </div>`;
}

// ============================================================
// 约拍 Tab
// ============================================================

function chk(name, label, disabled) {
  const checked = selectedItems.has(name);
  return `<label class="checkbox-item${disabled?' disabled':''}${checked?' checked':''}"
    onclick="toggleCheck('${name.replace(/'/g,"\\'")}',${disabled},event)"><span>${label}</span></label>`;
}

function renderBooking() {
  const d = DATA.digital;
  const inter = d.categories.find(c => c.id === 'interchangeable');
  const fixed = d.categories.find(c => c.id === 'fixed');
  const film  = DATA.filmInstant.categories.find(c => c.id === 'film');
  const inst  = DATA.filmInstant.categories.find(c => c.id === 'instant');

  const instBrandName = cam =>
    cam.name.includes('Polaroid') ? '宝丽来'
    : cam.name.includes('Wide') ? '富士'
    : 'Lomography';

  return `<div class="booking-section">
    <div class="section-title">提交约拍</div>
    <div class="section-desc">选好器材，留下联系方式，我会尽快回复你</div>
    <div class="form-card">
      <form id="bookingForm" onsubmit="handleSubmit(event)">
        <input type="hidden" name="access_key" value="${DATA.web3formsKey}">
        <input type="hidden" name="subject" value="📷 新的约拍需求">
        <input type="hidden" name="from_name" value="${DATA.studioName}">

        <div class="form-group">
          <label class="form-label">称呼<span class="required">*</span></label>
          <input class="form-input" name="name" placeholder="怎么称呼你" required>
        </div>
        <div class="form-group">
          <label class="form-label">联系方式<span class="required">*</span></label>
          <input class="form-input" name="contact" placeholder="微信号 / 手机号" required>
        </div>

        <div class="form-group">
          <label class="form-label">想用的器材（可多选）</label>

          <div class="form-equip-group">
            <span class="form-cat-label">📷 数码</span>
            <span class="form-sub-label">可更换镜头</span>
            ${inter.brands.map(b => `
              <span class="form-brand-label">${b.label}</span>
              <span class="form-item-label">机身</span>
              <div class="checkbox-grid">
                ${chk(b.body.name, b.body.icon+' '+b.body.name, b.body.status==='unavailable')}
              </div>
              ${b.lenses.length ? `
                <span class="form-item-label">镜头</span>
                <div class="checkbox-grid">
                  ${b.lenses.map(l => chk(l.name, l.icon+' '+l.name, l.status==='unavailable')).join('')}
                </div>` : ''}
            `).join('')}
            <span class="form-sub-label">固定镜头</span>
            ${fixed.cameras.map(c => `
              <span class="form-item-label">机身</span>
              <div class="checkbox-grid">
                ${chk(c.name, c.icon+' '+c.name, c.status==='unavailable')}
              </div>
            `).join('')}
          </div>

          <div class="form-equip-group">
            <span class="form-cat-label">🎞️ 胶片 / 拍立得</span>
            <span class="form-sub-label">胶片</span>
            ${film.cameras.map(cam => `
              <span class="form-item-label">机身</span>
              <div class="checkbox-grid">
                ${chk(cam.name, cam.icon+' '+cam.name, cam.status==='unavailable')}
              </div>
              <span class="form-item-label">胶卷</span>
              <div class="checkbox-grid">
                ${cam.stocks.map(s => chk(s.name, '🎞️ '+s.name, false)).join('')}
              </div>
            `).join('')}
            <span class="form-sub-label">拍立得</span>
            ${inst.cameras.map(cam => `
              <span class="form-brand-label">${instBrandName(cam)}</span>
              <span class="form-item-label">机身</span>
              <div class="checkbox-grid">
                ${chk(cam.name, cam.icon+' '+cam.name, cam.status==='unavailable')}
              </div>
              <span class="form-item-label">相纸</span>
              <div class="checkbox-grid">
                ${cam.papers.map(p => chk(p.name, '🗂️ '+p.name, p.stock===0)).join('')}
              </div>
            `).join('')}
          </div>

          <input type="hidden" name="equipment" id="equipInput">
        </div>

        <div class="form-group">
          <label class="form-label">其他想说的</label>
          <textarea class="form-textarea" name="message" placeholder="拍摄想法、风格偏好、人数等都可以写"></textarea>
        </div>

        <button class="form-submit" type="submit" id="submitBtn">📨 提交约拍</button>
      </form>
    </div>
  </div>`;
}

// ============================================================
// 渲染 & 路由
// ============================================================

function render() {
  let tabContent = '';
  if      (currentTab === 'digital')     tabContent = renderDigital();
  else if (currentTab === 'filmInstant') tabContent = renderFilmInstant();
  else                                   tabContent = renderBooking();

  document.getElementById('app').innerHTML = `
    <div class="hero">
      <h1>${DATA.studioName}</h1>
      <div class="subtitle">${DATA.subtitle}</div>
      <div class="contact-row">
        ${DATA.contacts.map(c => `<span class="contact-tag">${c.label}</span>`).join('')}
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn${currentTab==='digital'?' active':''}" onclick="switchTab('digital')">📷 数码</button>
      <button class="tab-btn${currentTab==='filmInstant'?' active':''}" onclick="switchTab('filmInstant')">🎞️ 胶片/拍立得</button>
      <button class="tab-btn${currentTab==='booking'?' active':''}" onclick="switchTab('booking')">📝 约拍</button>
    </div>
    ${tabContent}
    <div class="footer">© ${new Date().getFullYear()} ${DATA.studioName} · 仅限朋友圈约拍</div>
  `;

  updateScrollSpy();
}

function switchTab(tab) {
  currentTab = tab;
  render();
  const el = document.querySelector('.tabs');
  if (el) window.scrollTo({ top: el.offsetTop - 10, behavior: 'smooth' });
}

function toggleCheck(name, disabled, e) {
  e.preventDefault();
  if (disabled) return;
  if (selectedItems.has(name)) selectedItems.delete(name); else selectedItems.add(name);
  render();
}

// ============================================================
// Scroll spy
// ============================================================

function updateScrollSpy() {
  const sections = document.querySelectorAll('[data-spy]');
  if (!sections.length) return;
  let current = null;
  sections.forEach(s => { if (s.getBoundingClientRect().top <= 110) current = s.dataset.spy; });
  document.querySelectorAll('.toc-l1,.toc-l2').forEach(el => {
    el.classList.toggle('active', !!current && el.dataset.target === current);
  });
}

window.addEventListener('scroll', updateScrollSpy, { passive: true });

function scrollToId(id) {
  const el = document.getElementById(id);
  if (!el) return;
  window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 72, behavior: 'smooth' });
}

// ============================================================
// Form submit
// ============================================================

async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '提交中...';
  document.getElementById('equipInput').value = [...selectedItems].join(', ') || '未选择';
  const json = Object.fromEntries(new FormData(e.target));
  try {
    const resp = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
      body: JSON.stringify(json)
    });
    const result = await resp.json();
    if (result.success) { showSuccess(); selectedItems.clear(); }
    else { alert('提交失败，请直接微信联系我：' + DATA.wechatId); btn.disabled = false; btn.textContent = '📨 提交约拍'; }
  } catch { showSuccess(); selectedItems.clear(); }
}

function showSuccess() {
  document.getElementById('successWechat').textContent = '微信号: ' + DATA.wechatId;
  document.getElementById('successOverlay').classList.add('show');
}
function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
  currentTab = 'digital'; render();
}

// ============================================================
// Lightbox
// ============================================================

function openLightbox(src) {
  event.stopPropagation();
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

render();
</script>
</body>
</html>
