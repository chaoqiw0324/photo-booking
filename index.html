<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>约拍工作室</title>
<style>
:root {
  --accent: #2c2c2c;
  --accent-light: #f7f5f2;
  --blue: #0d6efd;
  --green: #34a853;
  --red: #d93025;
  --orange: #f29d0e;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: #faf9f7;
  color: #333;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* --- Hero --- */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
  background: linear-gradient(180deg, #f0ece6 0%, #faf9f7 100%);
}
.hero h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
.hero .subtitle { margin-top: 8px; font-size: 14px; color: #888; }
.hero .contact-row {
  margin-top: 16px;
  display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
}
.hero .contact-tag {
  font-size: 13px; color: #666; background: #fff;
  padding: 6px 16px; border-radius: 20px; box-shadow: var(--shadow);
}

/* --- Tabs --- */
.tabs {
  display: flex; justify-content: center;
  position: sticky; top: 0; z-index: 100;
  background: #faf9f7; padding: 12px 20px 0;
}
.tab-btn {
  padding: 10px 20px; font-size: 14px; font-weight: 500;
  border: none; background: none; color: #999; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* --- Section --- */
.section {
  max-width: 800px; margin: 0 auto; padding: 20px 16px 40px;
}
.section-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--accent); }
.section-desc { font-size: 13px; color: #999; margin-bottom: 20px; }
.section.hidden { display: none; }

/* --- Equipment Card --- */
.equip-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px;
  transition: transform 0.2s;
}
.equip-card:hover { transform: translateY(-2px); }
.equip-header { display: flex; align-items: center; padding: 16px; gap: 14px; }
.equip-icon {
  width: 52px; height: 52px; border-radius: 10px;
  background: var(--accent-light); display: flex;
  align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0;
}
.equip-info { flex: 1; min-width: 0; }
.equip-name { font-size: 15px; font-weight: 600; color: #222; }
.equip-spec { font-size: 12px; color: #999; margin-top: 2px; }
.equip-status {
  font-size: 12px; font-weight: 500; padding: 4px 10px;
  border-radius: 12px; flex-shrink: 0;
}
.status-available { background: #e6f4ea; color: var(--green); }
.status-in-use { background: #fef3e0; color: var(--orange); }
.status-unavailable { background: #fce8e6; color: var(--red); }

.sample-gallery {
  display: flex; gap: 4px; padding: 0 16px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
}
.sample-gallery::-webkit-scrollbar { display: none; }
.sample-img {
  width: 140px; height: 180px; object-fit: cover; border-radius: 8px;
  flex-shrink: 0; scroll-snap-align: start; background: #eee;
  cursor: pointer; transition: opacity 0.2s;
}
.sample-img:hover { opacity: 0.85; }

/* --- Film Cards --- */
.film-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;
}
.film-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden; transition: transform 0.2s;
}
.film-card:hover { transform: translateY(-2px); }
.film-cover {
  width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #eee; display: block;
}
.film-body { padding: 14px; }
.film-name { font-size: 14px; font-weight: 600; color: #222; }
.film-type { font-size: 12px; color: #999; margin-top: 2px; }
.film-stock-row {
  display: flex; align-items: center; justify-content: space-between; margin-top: 10px;
}
.film-stock { font-size: 13px; font-weight: 500; }
.stock-ok { color: var(--green); }
.stock-low { color: var(--orange); }
.stock-out { color: var(--red); }
.film-count { font-size: 12px; color: #bbb; }

.film-samples {
  display: flex; gap: 4px; padding: 0 14px 14px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.film-samples::-webkit-scrollbar { display: none; }
.film-sample-img {
  width: 80px; height: 80px; object-fit: cover; border-radius: 6px;
  flex-shrink: 0; background: #eee; cursor: pointer; transition: opacity 0.2s;
}
.film-sample-img:hover { opacity: 0.85; }

/* --- Booking Form --- */
.form-card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px;
}
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px;
}
.form-label .required { color: var(--red); margin-left: 2px; }
.form-input, .form-textarea, .form-date {
  width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
  border-radius: 8px; font-size: 14px; font-family: inherit;
  background: #fafafa; transition: border-color 0.2s; outline: none;
}
.form-input:focus, .form-textarea:focus, .form-date:focus {
  border-color: var(--accent); background: #fff;
}
.form-textarea { resize: vertical; min-height: 60px; }

/* Checkbox grid */
.checkbox-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.checkbox-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: #555; cursor: pointer;
  background: #f5f5f5; padding: 6px 12px; border-radius: 20px;
  transition: all 0.2s; user-select: none; border: 1.5px solid transparent;
}
.checkbox-item:hover { background: #eee; }
.checkbox-item.checked {
  background: #f0ece6; border-color: var(--accent); color: var(--accent); font-weight: 500;
}
.checkbox-item.disabled {
  opacity: 0.45; cursor: not-allowed; text-decoration: line-through;
}
.checkbox-item input { display: none; }

/* Submit */
.form-submit {
  width: 100%; padding: 14px; border: none; border-radius: 10px;
  background: var(--accent); color: #fff; font-size: 16px;
  font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  font-family: inherit;
}
.form-submit:hover { opacity: 0.85; }
.form-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* Success overlay */
.success-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 500;
  align-items: center; justify-content: center; padding: 20px;
}
.success-overlay.show { display: flex; }
.success-card {
  background: #fff; border-radius: 16px; padding: 40px 30px;
  text-align: center; max-width: 360px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.success-icon { font-size: 48px; margin-bottom: 16px; }
.success-title { font-size: 20px; font-weight: 700; color: #222; }
.success-desc { font-size: 14px; color: #888; margin-top: 10px; line-height: 1.8; }
.success-wechat {
  margin-top: 20px; padding: 14px; background: #f0ece6;
  border-radius: 10px; font-size: 15px; font-weight: 600;
  color: var(--accent); letter-spacing: 1px;
}
.success-wechat-hint { font-size: 12px; color: #aaa; margin-top: 6px; }
.success-close {
  margin-top: 20px; padding: 10px 32px; border: 1.5px solid #ddd;
  border-radius: 8px; background: none; font-size: 14px;
  cursor: pointer; color: #666; font-family: inherit;
}

/* --- Lightbox --- */
.lightbox {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9); z-index: 1000;
  align-items: center; justify-content: center; cursor: zoom-out;
}
.lightbox.show { display: flex; }
.lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; border-radius: 4px; }

/* --- Footer --- */
.footer { text-align: center; padding: 40px 20px; font-size: 12px; color: #ccc; }

@media (max-width: 480px) {
  .hero h1 { font-size: 22px; }
  .sample-img { width: 120px; height: 150px; }
  .film-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .tab-btn { padding: 10px 14px; font-size: 13px; }
}
</style>
</head>
<body>

<div id="app"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="预览">
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-card">
    <div class="success-icon">🎉</div>
    <div class="success-title">提交成功！</div>
    <div class="success-desc">我已收到你的约拍需求<br>会尽快通过微信联系你确认细节</div>
    <div class="success-wechat" id="successWechat"></div>
    <div class="success-wechat-hint">👆 添加微信沟通更快哦</div>
    <button class="success-close" onclick="closeSuccess()">好的</button>
  </div>
</div>

<script>
// ============================================================
// 📷 数据配置区 —— 所有内容改这里
// ============================================================

const DATA = {
  // --- 基本信息 ---

  // --- Web3Forms Access Key ---
  web3formsKey: "c390e973-0486-421a-a7bd-4a339d8207e8",

  // --- 器材列表 ---
  // status: "available" | "in-use" | "unavailable"
  equipment: [
    // ── Sony 系统 ──
    {
      icon: "📷", name: "Sony α7C II",

    {

    },
    // ── Fujifilm ──
    {

      status: "available",
      samples: []
    },
    // ── Hasselblad 系统 ──
    {
      icon: "📷", name: "Hasselblad 907X & CFV 100C",
      spec: "中画幅数码后背 · 一亿像素",
      status: "available",
      samples: []
    },
    {
      icon: "🔭", name: "Hasselblad XCD 28mm F4 P",
      spec: "等效22mm人文广角 · 极致轻便",
      status: "available",

    },
    // ── 胶片 & 拍立得相机 ──
    {

    {

    },
    {
      icon: "📸", name: "Fujifilm Instax Wide Evo",

    {

      spec: "乐模迷你拍立得 · 多重曝光",
      status: "available",
      samples: []
    }
  ],

  // --- 宝丽来相纸库存 ---
  // stock: 每盒 8 张，数字为盒数。0 = 缺货（仍展示，但表单中不可选）
  films: [
    // ── 600 系列 ──
    {
      name: "Polaroid 600 Round Frame", type: "600 系列 · 圆框限量版",
      stock: 2,
      cover: "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400",
      samples: []
    },
    // ── SX-70 系列 ──
    {

      cover: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400",
      samples: []
    },
    // ── I-Type 系列 ──
    {
      name: "Polaroid I-Type Thrasher Edition", type: "I-Type 系列 · Thrasher 限量版",
      stock: 3,
      cover: "https://images.unsplash.com/photo-1554080353-a576cf803bda?w=400",
      samples: []
    },
    {
      name: "Polaroid I-Type MoMA Edition", type: "I-Type 系列 · MoMA 限量版",
      stock: 2,
      cover: "https://images.unsplash.com/photo-1504198453319-5ce911bafcde?w=400",
      samples: []
    },
    {
      name: "Polaroid I-Type Basquiat Edition", type: "I-Type 系列 · Basquiat 限量版",
      stock: 1,
      cover: "https://images.unsplash.com/photo-1495745966610-2a67f2297e5e?w=400",
      samples: []
    },
    {
      name: "Polaroid I-Type Black & White", type: "I-Type 系列 · 黑白相纸",
      stock: 1,
      cover: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400",
      samples: []
    }
  ]
};

// ============================================================
// 🔧 渲染逻辑
// ============================================================

let currentTab = 'equipment';
let selectedEquip = new Set();
let selectedFilm = new Set();

function statusLabel(s) {
  const map = {
    'available':   ['可预约', 'status-available'],
    'in-use':      ['使用中', 'status-in-use'],
    'unavailable': ['不可用', 'status-unavailable']
  };
  const [text, cls] = map[s] || ['—', ''];
  return `<span class="equip-status ${cls}">${text}</span>`;
}

function stockLabel(n) {
  if (n === 0) return ['暂无库存', 'stock-out'];
  if (n <= 5)  return [`剩 ${n} 份`, 'stock-low'];
  return [`有货 (${n})`, 'stock-ok'];
}

function renderSamples(imgs, cls = 'sample-img') {
  if (!imgs || imgs.length === 0) return '';
  return imgs.map(src =>
    `<img class="${cls}" src="${src}" alt="客片" loading="lazy" onclick="openLightbox('${src.replace(/w=\d+/, 'w=1200')}')" onerror="this.style.display='none'">`
  ).join('');
}

function renderEquipment() {
  return DATA.equipment.map(e => `
    <div class="equip-card">
      <div class="equip-header">
        <div class="equip-icon">${e.icon}</div>
        <div class="equip-info">
          <div class="equip-name">${e.name}</div>
          <div class="equip-spec">${e.spec}</div>
        </div>
        ${statusLabel(e.status)}
      </div>
      ${e.samples.length ? `<div class="sample-gallery">${renderSamples(e.samples)}</div>` : ''}
    </div>
  `).join('');
}

function renderFilms() {
  return DATA.films.map(f => {
    const [stockText, stockCls] = stockLabel(f.stock);
    return `
      <div class="film-card">
        <img class="film-cover" src="${f.cover}" alt="${f.name}" loading="lazy"
             onclick="openLightbox('${f.cover.replace(/w=\d+/, 'w=1200')}')"
             onerror="this.style.background='#ddd'">
        <div class="film-body">
          <div class="film-name">${f.name}</div>
          <div class="film-type">${f.type}</div>
          <div class="film-stock-row">
            <span class="film-stock ${stockCls}">${stockText}</span>
            ${f.stock > 0 ? `<span class="film-count">${f.stock} 张/盒</span>` : ''}
          </div>
        </div>
        ${f.samples.length ? `<div class="film-samples">${renderSamples(f.samples, 'film-sample-img')}</div>` : ''}
      </div>
    `;
  }).join('');
}

function renderBookingForm() {
  const equipOptions = DATA.equipment.map(e => {
    const disabled = e.status === 'unavailable';
    return `<label class="checkbox-item ${disabled ? 'disabled' : ''} ${selectedEquip.has(e.name) ? 'checked' : ''}"
                   onclick="toggleCheck('equip','${e.name}', ${disabled}, event)">
              <span>${e.icon} ${e.name}</span>
            </label>`;
  }).join('');

  const filmOptions = DATA.films.map(f => {
    const disabled = f.stock === 0;
    return `<label class="checkbox-item ${disabled ? 'disabled' : ''} ${selectedFilm.has(f.name) ? 'checked' : ''}"
                   onclick="toggleCheck('film','${f.name}', ${disabled}, event)">
              <span>${f.name}${disabled ? '(缺货)' : ''}</span>
            </label>`;
  }).join('');

  return `
    <div class="form-card">
      <form id="bookingForm" onsubmit="handleSubmit(event)">
        <input type="hidden" name="access_key" value="${DATA.web3formsKey}">
        <input type="hidden" name="subject" value="📷 新的约拍需求">
        <input type="hidden" name="from_name" value="${DATA.studioName}">
        <div class="form-group">
          <label class="form-label">称呼<span class="required">*</span></label>
          <input class="form-input" name="name" placeholder="怎么称呼你" required>
        </div>

        <div class="form-group">
          <label class="form-label">联系方式<span class="required">*</span></label>
          <input class="form-input" name="contact" placeholder="微信号 / 手机号" required>
        </div>

        <div class="form-group">
          <label class="form-label">想约哪天拍</label>
          <input class="form-date" name="date" type="date" min="${new Date().toISOString().split('T')[0]}">
        </div>

        <div class="form-group">
          <label class="form-label">想用的器材（可多选）</label>
          <div class="checkbox-grid">${equipOptions}</div>
          <input type="hidden" name="equipment" id="equipInput">
        </div>

        <div class="form-group">
          <label class="form-label">想拍的相纸/胶卷（可多选）</label>
          <div class="checkbox-grid">${filmOptions}</div>
          <input type="hidden" name="film" id="filmInput">
        </div>

        <div class="form-group">
          <label class="form-label">其他想说的</label>
          <textarea class="form-textarea" name="message" placeholder="拍摄想法、风格偏好、人数等都可以写"></textarea>
        </div>

        <button class="form-submit" type="submit" id="submitBtn">📨 提交约拍</button>
      </form>
    </div>
  `;
}

function render() {
  document.getElementById('app').innerHTML = `
    <div class="hero">
      <h1>${DATA.studioName}</h1>
      <div class="subtitle">${DATA.subtitle}</div>
      <div class="contact-row">
        ${DATA.contacts.map(c => `<span class="contact-tag">${c.label}</span>`).join('')}
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${currentTab === 'equipment' ? 'active' : ''}" onclick="switchTab('equipment')">📷 器材</button>
      <button class="tab-btn ${currentTab === 'films' ? 'active' : ''}" onclick="switchTab('films')">🎞️ 相纸</button>
      <button class="tab-btn ${currentTab === 'booking' ? 'active' : ''}" onclick="switchTab('booking')">📝 约拍</button>
    </div>

    <div class="section ${currentTab !== 'equipment' ? 'hidden' : ''}">
      <div class="section-title">拍摄器材</div>
      <div class="section-desc">点击客片可放大查看</div>
      ${renderEquipment()}
    </div>

    <div class="section ${currentTab !== 'films' ? 'hidden' : ''}">
      <div class="section-title">相纸 & 胶卷库存</div>
      <div class="section-desc">缺货的相纸仍可查看往期客片效果</div>
      <div class="film-grid">${renderFilms()}</div>
    </div>

    <div class="section ${currentTab !== 'booking' ? 'hidden' : ''}">
      <div class="section-title">提交约拍</div>
      <div class="section-desc">选好器材和相纸，留下联系方式，我会尽快回复你</div>
      ${renderBookingForm()}
    </div>

    <div class="footer">© ${new Date().getFullYear()} ${DATA.studioName} · 仅限朋友圈约拍</div>
  `;
}

function switchTab(tab) {
  currentTab = tab;
  render();
  window.scrollTo({ top: document.querySelector('.tabs').offsetTop - 10, behavior: 'smooth' });
}

function toggleCheck(type, name, disabled, e) {
  e.preventDefault();
  if (disabled) return;
  const set = type === 'equip' ? selectedEquip : selectedFilm;
  if (set.has(name)) set.delete(name); else set.add(name);
  render();
}

async function handleSubmit(e) {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  // 写入隐藏字段
  document.getElementById('equipInput').value = [...selectedEquip].join(', ') || '未选择';
  document.getElementById('filmInput').value = [...selectedFilm].join(', ') || '未选择';

  const formData = new FormData(form);

  const json = Object.fromEntries(formData);

  try {
    const resp = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(json)
    });
    const result = await resp.json();

    if (result.success) {
      showSuccess();
      selectedEquip.clear();
      selectedFilm.clear();
    } else {
      alert('提交失败，请直接微信联系我：' + DATA.wechatId);
      btn.disabled = false;
      btn.textContent = '📨 提交约拍';
    }
  } catch (err) {
    // 网络异常或未配置 key，仍弹出微信联系方式
    showSuccess();
    selectedEquip.clear();
    selectedFilm.clear();
  }
}

function showSuccess() {
  document.getElementById('successWechat').textContent = '微信号: ' + DATA.wechatId;
  document.getElementById('successOverlay').classList.add('show');
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
  currentTab = 'equipment';
  render();
}

function openLightbox(src) {
  event.stopPropagation();
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Scroll spy for food list
document.addEventListener('scroll', function() {
  const sections = document.querySelectorAll('[id^="cate-"]');
  for (let i = sections.length - 1; i >= 0; i--) {
    const rect = sections[i].getBoundingClientRect();
    if (rect.top <= 100) break;
  }
});

render();
</script>
</body>
</html>
